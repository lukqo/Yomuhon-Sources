name: Validate Sources

on:
  push:
    paths:
      - "index.json"
      - "sources/**"
      - "tests/**"
      - "schemas/**"
      - "scripts/**"
      - ".github/workflows/validate-sources.yml"
  pull_request:
    paths:
      - "index.json"
      - "sources/**"
      - "tests/**"
      - "schemas/**"
      - "scripts/**"
      - ".github/workflows/validate-sources.yml"
  workflow_dispatch:
  schedule:
    - cron: "17 0,12 * * *"

permissions:
  contents: read

concurrency:
  group: sources-validation-${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: ${{ github.event_name != 'schedule' }}

jobs:
  static-validation:
    name: Static validation
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install validator dependencies
        run: python -m pip install --disable-pip-version-check -r scripts/requirements.txt

      - name: Validate source definitions
        run: python scripts/validate_sources.py

  live-validation:
    name: Live reading-path validation
    if: github.ref == 'refs/heads/main' && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    needs: static-validation
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install validator dependencies
        run: python -m pip install --disable-pip-version-check -r scripts/requirements.txt

      - name: Run live source validation
        run: |
          mkdir -p artifacts
          python scripts/validate_sources.py \
            --live \
            --report artifacts/live-source-report.json

      - name: Upload live validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-source-report-${{ github.run_id }}
          path: artifacts/live-source-report.json
          if-no-files-found: warn
          retention-days: 14
